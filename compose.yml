services:
  # floci is a replacement for localstack. It emulates AWS resources (sqs, sns, s3 etc) for local development
  # See: https://floci.io for more details
  floci:
    image: hectorvent/floci:latest-aws
    ports:
      - '4566:4566'
    env_file:
      - 'compose/aws.env'
    environment:
      FLOCI_DEFAULT_REGION: eu-west-2
    volumes:
      - ./compose/floci/start.d:/etc/floci/init/start.d:ro
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    networks:
      - cdp-tenant

postgres:
  image: postgres:16-alpine
  ports:
    - '5432:5432'
  environment:
    POSTGRES_USER: lis_infra_feature_flag_ddl
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: lis_infra_feature_flag
  networks:
    - cdp-tenant
  volumes:
    - postgres-data:/data
  restart: always
  healthcheck:
    test: [ "CMD-SHELL", "pg_isready -U lis_infra_feature_flag_ddl -d lis_infra_feature_flag" ]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
  
  liquibase:
    image: liquibase/liquibase:5.0.1
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ./changelog:/liquibase/changelog
    command: >
      "/liquibase/liquibase lpm add postgresql || true &&
      /liquibase/liquibase --url=jdbc:postgresql://postgres:5432/lis_infra_feature_flag --username=lis_infra_feature_flag_ddl --password=postgres --searchPath=/liquibase/changelog --changeLogFile=db.changelog.xml --liquibaseSchemaName=public update --context-filter=default"
    networks:
      - cdp-tenant
  
  identity-service-helper:
    container_name: identity-lis_infra_feature_flag-helper
    platform: linux
    build: ./
    ports:
      - '8080:8080'
    links:
      - 'floci:floci'
      - 'postgres:postgres'
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_started
      liquibase:
        condition: service_completed_successfully
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 8080
      ASPNETCORE_ENVIRONMENT: Development
      LOCALSTACK_ENDPOINT: http://localstack:4566
      POSTGRES_URI: http://postgres:5432
      ConnectionStrings__PostgresConnection: "User ID=lis_infra_feature_flag_ddl;Password=postgres;Host=postgres;Database=lis_infra_feature_flag;"
      ConnectionStrings__ReadOnlyPostgresConnection: "User ID=lis_infra_feature_flag_ddl;Password=postgres;Host=postgres;Database=lis_infra_feature_flag;"
    networks:
      - cdp-tenant

volumes:
  postgres-data:

networks:
  cdp-tenant:
    driver: bridge
